{% extends "layout.html" %}
{% block content %}

<style>
body {
    background: #0f172a;
    color: #fff;
    font-family: Arial, sans-serif;
}
.form-card {
    background: #1e293b;
    max-width: 400px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.form-card h2 {
    text-align: center;
    margin-bottom: 24px;
}
.form-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #fff;
}
.form-card input::placeholder {
    color: #94a3b8;
}
.form-card button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.form-card button:hover {
    background: #2563eb;
}
.flash-msg {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 12px;
    text-align: center;
}
.flash-danger { background: #f87171; color: white; }
.flash-success { background: #4ade80; color: white; }
.flash-info { background: #60a5fa; color: white; }
.link {
    display: block;
    text-align: center;
    margin-top: 12px;
    color: #3b82f6;
}
.link:hover { color: #2563eb; }
</style>

<div class="form-card">
    <h2>Teacher Signup</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">
                {{ message }}
            </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Signup</button>
    </form>

    <a class="link" href="/">Already have an account? Login</a>
</div>

{% endblock %}
